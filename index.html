<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗝️ مكتشف الأسرار</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗝️</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --bg: #f4f7f6; --text: #2c3e50; --primary: #8e44ad; --gold: #d4af37; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }

        /* شعار الزاوية */
        .logo-container {
            position: fixed; top: 20px; right: 20px; z-index: 1001; display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.85); padding: 8px 15px; border-radius: 30px; border: 1px solid var(--gold);
        }
        .logo-icon { font-size: 25px; margin-left: 10px; }
        .logo-text { color: var(--gold); font-weight: bold; font-size: 14px; }

        /* الهيدر */
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; padding: 60px 20px; text-align: center;
        }
        .header h1 { font-family: 'Amiri', serif; font-size: 2.5rem; margin: 15px 0; }
        .search-box { 
            width: 90%; max-width: 450px; padding: 15px 25px; border-radius: 30px; border: none; 
            margin-top: 20px; outline: none; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; padding: 20px; }
        .book-cover { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .book-cover:hover { transform: translateY(-5px); border-color: var(--primary); }
        .book-cover i { font-size: 3rem; color: var(--primary); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-icon">🗝️</div>
        <div class="logo-text">مكتشف الأسرار</div>
    </div>

    <div class="header">
        <div style="font-size: 3rem;">🗝️</div>
        <h1>مكتشف الأسرار</h1>
        <p>بين كل سطر وسطر، عالمٌ ينتظر من يفك أسراره</p>
        <input type="text" id="search" class="search-box" placeholder="ابحث عن السر القادم..." onkeyup="searchBooks()">
    </div>

    <div class="grid-container" id="book-shelf"></div>

    <script>
        const myStories = [
            { title: "سر البخلاء", icon: "fa-book" },
            { title: "حكايات قديمة", icon: "fa-scroll" },
            { title: "كنوز وذرف", icon: "fa-gem" }
        ];

        function displayBooks() {
            const shelf = document.getElementById('book-shelf');
            shelf.innerHTML = '';
            myStories.forEach((item) => {
                const cover = document.createElement('div');
                cover.className = 'book-cover';
                cover.innerHTML = `<i class="fas ${item.icon}"></i><h3>${item.title}</h3>`;
                shelf.appendChild(cover);
            });
        }
        window.onload = displayBooks;
    </script>
</body>
</html>
