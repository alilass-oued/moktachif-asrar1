<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <div class="header">
        <div style="margin-bottom: 10px;">
            <i class="fas fa-feather-alt" style="color: var(--gold); font-size: 2.8rem; text-shadow: 2px 2px 5px rgba(0,0,0,0.4);"></i>
        </div>
    
        <p style="font-family: 'Tajawal', sans-serif; font-size: 0.9rem; letter-spacing: 2px; color: var(--gold); margin: 0; text-transform: uppercase; font-weight: bold; opacity: 0.9;">
            حكايات الأمس برؤية اليوم
        </p>
    
        <h1 style="font-family: 'Amiri', serif; font-size: 2rem; margin: 10px 0; color: white; line-height: 1.4; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);">
            بين كل سطر وسطر، عالمٌ ينتظر من يفك أسراره
        </h1>
    
        <div style="width: 60px; height: 2px; background: var(--gold); margin: 15px auto; border-radius: 2px;"></div>
    
        <div style="position: relative; max-width: 450px; margin: 0 auto;">
            <input type="text" id="search" class="search-box" placeholder="ابحث عن السر القادم..." onkeyup="searchBooks()">
            <i class="fas fa-search" style="position: absolute; left: 20px; top: 28px; color: var(--primary); opacity: 0.5;"></i>
        </div>
    </div>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتشف الأسرار</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #f4f7f6; --text: #2c3e50; --primary: #8e44ad; --paper: #f9f4e8; --gold: #d4af37; 
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); padding-bottom: 50px;
        }

        /* الهيدر وشريط البحث */
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100;
        }
        .search-box { 
            width: 90%; max-width: 400px; padding: 12px; border-radius: 25px; border: none; margin-top: 15px; background: rgba(255,255,255,0.9); outline: none; font-size: 1rem;
        }

        /* شبكة المربعات (Grid) */
        .grid-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1000px; margin: 30px auto; padding: 15px;
        }

        /* تصميم المربع (غلاف الكتاب) */
        .book-cover { 
            background: white; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; height: 180px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; border: 1px solid #eee;
        }
        .book-cover:hover { transform: translateY(-5px) scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--primary); }
        .book-cover i { font-size: 2.5rem; color: var(--primary); margin-top: 15px; }
        .book-cover h3 { font-size: 1.1rem; margin: 10px 0; color: var(--text); overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; flex-grow: 1; }
        
        /* شارة نوع الملف */
        .type-badge { 
            position: absolute; top: -10px; right: -10px; background: var(--gold); color: white; padding: 15px 10px 5px; font-size: 0.7rem; font-weight: bold; transform: rotate(45deg); width: 60px; text-align: center;
        }

        /* ---------- النافذة المنبثقة (Modal) ---------- */
        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }

        /* محتوى النافذة (شكل صفحة كتاب كبيرة) */
        .modal-content { 
            background-color: var(--paper); font-family: 'Amiri', serif; margin: 5vh auto; padding: 40px; border-radius: 5px; width: 90%; max-width: 700px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; border-right: 15px solid #dcd3bc; /* كعب الكتاب */ line-height: 1.8; animation: zoomIn 0.3s;
        }

        @keyframes zoomIn { from {transform: scale(0.7); opacity: 0;} to {transform: scale(1); opacity: 1;} }

        /* زر الإغلاق */
        .close-btn { 
            position: absolute; top: 10px; left: 15px; color: var(--text); font-size: 2rem; cursor: pointer; z-index: 10;
        }
        .close-btn:hover { color: #e74c3c; }

        .modal-content h2 { text-align: center; font-size: 2rem; color: #8e44ad; border-bottom: 2px double var(--gold); padding-bottom: 10px; margin-bottom: 25px; }
        .modal-content p { font-size: 1.2rem; text-align: justify; white-space: pre-wrap; color: #333; }
        
        .download-link { display: inline-block; margin-top: 20px; color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 4px; }
        .download-link:hover { background: var(--gold); color: white; }

        .meta-info { font-size: 0.8rem; color: #7f8c8d; margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fas fa-magic"></i>حكايات الأمس برؤية اليوم.. بين كل سطر وسطر، عالمٌ ينتظر من يفك أسراره</h2>
        <input type="text" id="search" class="search-box" placeholder="ابحث في فهارس الكتب..." onkeyup="searchBooks()">
    </div>

    <div class="grid-container" id="book-shelf">
        </div>

    <div id="storyModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeStory()">&times;</span>
            <div style="text-align:center; color: var(--gold)"><i class="fas fa-feather-alt fa-2x"></i></div>
            <h2 id="modalTitle">العنوان</h2>
            <p id="modalDesc">المحتوى</p>
            <a id="modalDownload" href="#" class="download-link hidden" download><i class="fas fa-paperclip"></i> تحميل الملحق</a>
            <div class="meta-info">
                <span><i class="fas fa-pen-nib"></i> نُشر في: <span id="modalDate">التاريخ</span></span>
                <span><i class="fas fa-bookmark"></i> <span id="modalType">النوع</span></span>
            </div>
        </div>
    </div>

    <script>
        // دالة لعرض الأغلفة المربعة
        function displayBooks() {
            const shelf = document.getElementById('book-shelf');
            const data = JSON.parse(localStorage.getItem('myAdvancedLib')) || [];
            shelf.innerHTML = '';

            data.forEach((item, index) => {
                const cover = document.createElement('div');
                cover.className = 'book-cover';
                cover.onclick = () => openStory(index); // فتح القصة عند الضغط

                // أيقونة حسب النوع
                let iconClass = "fa-book";
                if(item.type === 'pdf') iconClass = "fa-file-pdf";
                else if(item.type === 'docx') iconClass = "fa-file-word";
                else if(item.type === 'image') iconClass = "fa-file-image";

                cover.innerHTML = `
                    <div class="type-badge">${item.type.toUpperCase()}</div>
                    <i class="fas ${iconClass}"></i>
                    <h3>${item.title}</h3>
                `;
                shelf.appendChild(cover);
            });
        }

        // دالة لفتح القصة بشكل كبير (Modal)
        function openStory(index) {
            const data = JSON.parse(localStorage.getItem('myAdvancedLib')) || [];
            const story = data[index];
            const modal = document.getElementById('storyModal');

            // ملء البيانات في النافذة
            document.getElementById('modalTitle').innerText = story.title;
            document.getElementById('modalDesc').innerText = story.desc;
            document.getElementById('modalDate').innerText = story.date;
            document.getElementById('modalType').innerText = story.type.toUpperCase();

            // معالجة زر التحميل
            const downloadBtn = document.getElementById('modalDownload');
            if(story.file && story.file !== "#") {
                downloadBtn.href = story.file;
                downloadBtn.download = story.name;
                downloadBtn.style.display = 'inline-block';
            } else {
                downloadBtn.style.display = 'none';
            }

            // إظهار النافذة
            modal.style.display = "block";
        }

        // دالة لإغلاق القصة
        function closeStory() {
            document.getElementById('storyModal').style.display = "none";
        }

        // إغلاق عند الضغط خارج النافذة
        window.onclick = function(event) {
            const modal = document.getElementById('storyModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // البحث
        function searchBooks() {
            let val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.book-cover').forEach(cover => {
                let title = cover.querySelector('h3').innerText.toLowerCase();
                cover.style.display = title.includes(val) ? 'flex' : 'none';
            });
        }

        window.onload = displayBooks;
    </script>
</body>
</html>
