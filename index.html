<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتشف الأسرار</title>

    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/old-key.png">

    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --bg: #f4f7f6; --text: #2c3e50; --primary: #8e44ad; --paper: #f9f4e8; --gold: #d4af37; 
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); padding-bottom: 50px;
        }

        /* تنسيق شعار الزاوية الثابت */
        .logo-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            display: flex;
            align-items: center;
            direction: rtl;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo-icon {
            font-size: 25px;
            margin-left: 10px;
            animation: shine 2s infinite alternate;
        }

        .logo-text {
            color: var(--gold);
            font-weight: bold;
            font-size: 14px;
        }

        /* الهيدر */
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 60px 20px; 
            text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .header h1 { font-family: 'Amiri', serif; font-size: 2.2rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1rem; letter-spacing: 1px; }

        .search-box { 
            width: 90%; max-width: 450px; padding: 15px 25px; border-radius: 30px; border: none; 
            margin-top: 25px; background: white; outline: none; font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* شبكة الكتب */
        .grid-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; max-width: 1100px; margin: 40px auto; padding: 20px;
        }

        .book-cover { 
            background: white; border-radius: 15px; padding: 20px; text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; 
            position: relative; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center;
        }
        .book-cover:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 12px 25px rgba(142, 68, 173, 0.2); }
        .book-cover i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .book-cover h3 { font-size: 1.1rem; margin: 0; color: var(--text); }

        /* Modal */
        .modal { 
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
        }

        .modal-content { 
            background-color: var(--paper); font-family: 'Amiri', serif; margin: 5vh auto; 
            padding: 40px; border-radius: 8px; width: 85%; max-width: 650px; 
            position: relative; border-right: 12px solid #dcd3bc; line-height: 1.8;
            animation: zoomIn 0.3s ease-out;
        }

        @keyframes zoomIn { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }
        @keyframes shine { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.2); opacity: 1; } }

        .close-btn { position: absolute; top: 15px; left: 20px; font-size: 2rem; cursor: pointer; color: #999; }
        .close-btn:hover { color: #e74c3c; }

        .meta-info { margin-top: 30px; padding-top: 15px; border-top: 1px dashed #ccc; display: flex; justify-content: space-between; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-icon">🗝️</div>
        <div class="logo-text">مكتشف الأسرار</div>
    </div>

    <div class="header">
        <p>حكايات الأمس برؤية اليوم</p>
        <h1>بين كل سطر وسطر، عالمٌ ينتظر من يفك أسراره</h1>
        <input type="text" id="search" class="search-box" placeholder="ابحث عن السر القادم..." onkeyup="searchBooks()">
    </div>

    <div class="grid-container" id="book-shelf">
        </div>

    <div id="storyModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeStory()">&times;</span>
            <div style="text-align:center; color: var(--gold); margin-bottom:10px;"><i class="fas fa-feather-alt fa-2x"></i></div>
            <h2 id="modalTitle" style="text-align:center; color: var(--primary);">العنوان</h2>
            <p id="modalDesc">المحتوى يظهر هنا...</p>
            <div class="meta-info">
                <span><i class="fas fa-calendar-alt"></i> التاريخ: <span id="modalDate">-</span></span>
                <span><i class="fas fa-tag"></i> النوع: <span id="modalType">-</span></span>
            </div>
        </div>
    </div>

    <script>
        // بيانات القصص (تأكد من تعديلها كما تحب)
        const myStories = [
            {
                title: "سر البخلاء",
                desc: "من عجائب قصص الجاحظ التي تكشف خبايا النفس البشرية بأسلوب ساخر وممتع...",
                date: "2026-04-01",
                type: "قصة"
            },
            {
                title: "أساطير وذرف",
                desc: "استكشاف للموروث الشعبي في منطقتنا الجميلة والحكايات التي يتوارثها الأجيال...",
                date: "2026-04-02",
                type: "بحث"
            }
        ];

        function displayBooks() {
            const shelf = document.getElementById('book-shelf');
            shelf.innerHTML = '';
            myStories.forEach((item, index) => {
                const cover = document.createElement('div');
                cover.className = 'book-cover';
                cover.onclick = () => openStory(index);
                cover.innerHTML = `
                    <i class="fas fa-book-open"></i>
                    <h3>${item.title}</h3>
                `;
                shelf.appendChild(cover);
            });
        }

        function openStory(index) {
            const story = myStories[index];
            document.getElementById('modalTitle').innerText = story.title;
            document.getElementById('modalDesc').innerText = story.desc;
            document.getElementById('modalDate').innerText = story.date;
            document.getElementById('modalType').innerText = story.type;
            document.getElementById('storyModal').style.display = "block";
        }

        function closeStory() {
            document.getElementById('storyModal').style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('storyModal')) closeStory();
        }

        function searchBooks() {
            let val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.book-cover').forEach(cover => {
                let title = cover.querySelector('h3').innerText.toLowerCase();
                cover.style.display = title.includes(val) ? 'flex' : 'none';
            });
        }

        window.onload = displayBooks;
    </script>
</body>
</html>
